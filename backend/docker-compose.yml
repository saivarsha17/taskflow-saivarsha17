version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: taskflow-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - '5433:5432'

    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DB_USER} -d ${DB_NAME}',
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - taskflow

  api:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: taskflow-api
    environment:
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
    ports:
      - '8000:8000'
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - taskflow

networks:
  taskflow:
    driver: bridge
